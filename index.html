<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jayant Kumar | Resume</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .download-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #000;
            color: white;
            padding: 12px 24px;

            transition: 0.3s;
            border: 1px solid #333;
            z-index: 9999;
        }
        .download-btn:hover {
            transform: translateY(-3px);
            background-color: #222;
        }
    </style>
</head>
<body>
    <iframe src="Jayant-Resume-1.1.pdf"></iframe>
